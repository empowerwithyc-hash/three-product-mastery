<style>
  :root{
    --gold:#C8A14B;
    --gold-soft:rgba(200,161,75,0.35);
    --gold-dim:rgba(200,161,75,0.14);
    --bg:#1C1917;
    --card:#26221E;
    --card-2:#2E2A24;
    --ivory:#F5EFE3;
    --ivory-dim:#C9C2B2;
    --danger:#C0563F;
    --success:#7FA06B;
    --font-head:'Cinzel', Georgia, 'Times New Roman', serif;
    --font-ui:'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-body:'Lora', Georgia, 'Times New Roman', serif;
    --radius:16px;
    --radius-sm:10px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ivory);}
  body{
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
    padding-top:var(--safe-top);
    padding-bottom:var(--safe-bottom);
  }
  h1,h2,h3,.heading{font-family:var(--font-head);letter-spacing:0.02em;color:var(--ivory);font-weight:600;}
  .ui{font-family:var(--font-ui);}
  a{color:var(--gold);}
  button{font-family:var(--font-ui);}
  ::selection{background:var(--gold-soft);color:var(--bg);}

  #app{max-width:720px;margin:0 auto;padding:16px 16px calc(24px + var(--safe-bottom));min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:6px 2px 14px;
  }
  .topbar .brandmark{display:flex;align-items:center;gap:10px;}
  .topbar .brandmark .glyph{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(160deg,#2E2A24,#1C1917);
    border:1px solid var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-head);color:var(--gold);font-size:20px;flex:none;
  }
  .topbar .brandname{font-family:var(--font-head);font-size:15px;line-height:1.2;color:var(--ivory);}
  .topbar .brandname small{display:block;font-family:var(--font-ui);font-size:10.5px;color:var(--ivory-dim);font-weight:500;letter-spacing:0.03em;margin-top:2px;}
  .topbar-actions{display:flex;align-items:center;gap:8px;}

  .iconbtn{
    background:var(--card);border:1px solid var(--gold-soft);color:var(--ivory);
    border-radius:10px;padding:8px 10px;font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;min-height:38px;
  }
  .iconbtn:active{background:var(--card-2);}

  .langtoggle{
    display:flex;background:var(--card);border:1px solid var(--gold-soft);border-radius:10px;overflow:hidden;
  }
  .langtoggle button{
    background:transparent;border:none;color:var(--ivory-dim);padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer;min-height:38px;
  }
  .langtoggle button.active{background:var(--gold);color:#221C10;}

  /* Cards / sections */
  .card{
    background:var(--card);border:1px solid var(--gold-soft);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;
  }
  .hero{
    text-align:center;padding:22px 16px 20px;margin-bottom:18px;
    background:radial-gradient(120% 140% at 50% 0%, rgba(200,161,75,0.16), rgba(200,161,75,0) 60%), var(--card);
    border:1px solid var(--gold-soft);border-radius:var(--radius);
  }
  .hero h1{font-size:26px;margin:0 0 6px;}
  .hero .subtitle{font-family:var(--font-ui);font-size:12.5px;color:var(--gold);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:16px;}

  .progress-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:6px;}
  .ring{position:relative;width:112px;height:112px;}
  .ring svg{transform:rotate(-90deg);width:112px;height:112px;}
  .ring circle{fill:none;stroke-width:9;}
  .ring .track{stroke:rgba(200,161,75,0.15);}
  .ring .fill{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .5s ease;}
  .ring .label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .label .pct{font-family:var(--font-head);font-size:22px;color:var(--ivory);}
  .ring .label .cap{font-family:var(--font-ui);font-size:9.5px;color:var(--ivory-dim);letter-spacing:0.04em;text-transform:uppercase;margin-top:2px;}

  .mock-btn{
    width:100%;margin-top:16px;
    background:linear-gradient(135deg, var(--gold), #B08B3C);
    color:#221C10;border:none;border-radius:var(--radius-sm);
    padding:14px 16px;font-family:var(--font-ui);font-weight:700;font-size:14.5px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 4px 14px rgba(200,161,75,0.25);
  }
  .mock-btn:active{transform:translateY(1px);}

  .section-head{
    font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--gold);margin:22px 4px 10px;display:flex;align-items:center;gap:8px;
  }
  .section-head::after{content:"";flex:1;height:1px;background:var(--gold-soft);}

  .module-row{
    display:flex;align-items:center;gap:12px;
    background:var(--card);border:1px solid var(--gold-soft);border-radius:var(--radius-sm);
    padding:13px 14px;margin-bottom:9px;cursor:pointer;text-align:left;width:100%;
  }
  .module-row:active{background:var(--card-2);}
  .module-row .num{
    font-family:var(--font-head);color:var(--gold);font-size:15px;flex:none;
    width:30px;height:30px;border-radius:50%;border:1px solid var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .module-row .info{flex:1;min-width:0;}
  .module-row .title{font-family:var(--font-ui);font-weight:600;font-size:14.5px;color:var(--ivory);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .module-row .status{font-family:var(--font-ui);font-size:11.5px;color:var(--ivory-dim);margin-top:2px;}
  .module-row .status.passed{color:var(--success);}
  .module-row .status.studied{color:var(--gold);}
  .module-row .chev{color:var(--gold);flex:none;font-size:18px;opacity:0.7;}

  /* Module screen */
  .screen-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .backbtn{
    background:var(--card);border:1px solid var(--gold-soft);color:var(--gold);
    border-radius:10px;width:40px;height:40px;flex:none;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .screen-title{flex:1;min-width:0;}
  .screen-title h2{font-size:18px;margin:0;line-height:1.25;}
  .screen-title .pkey{font-family:var(--font-ui);font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;}

  .hook-card{
    background:linear-gradient(160deg, var(--gold-dim), rgba(200,161,75,0.02));
    border:1px solid var(--gold-soft);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:14px;font-style:italic;color:var(--ivory);font-size:15px;line-height:1.6;
  }

  .tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border:1px solid var(--gold-soft);border-radius:12px;padding:4px;}
  .tabs button{
    flex:1;background:transparent;border:none;color:var(--ivory-dim);padding:10px 6px;font-size:12.5px;font-weight:600;
    border-radius:9px;cursor:pointer;min-height:40px;
  }
  .tabs button.active{background:var(--gold);color:#221C10;}

  .callout{
    background:rgba(200,161,75,0.1);border:1px solid var(--gold);border-radius:var(--radius-sm);
    padding:13px 15px;margin-bottom:14px;
  }
  .callout .callout-label{font-family:var(--font-ui);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gold);margin-bottom:6px;}
  .callout .callout-body{font-size:14.5px;line-height:1.65;}

  .guide-content{font-size:15px;line-height:1.75;color:var(--ivory);}
  .guide-content h1,.guide-content h2,.guide-content h3{font-family:var(--font-ui);color:var(--gold);font-size:14.5px;text-transform:uppercase;letter-spacing:0.04em;margin:18px 0 8px;}
  .guide-content h1:first-child,.guide-content h2:first-child,.guide-content h3:first-child{margin-top:0;}
  .guide-content p{margin:0 0 12px;}
  .guide-content ul,.guide-content ol{margin:0 0 12px;padding-left:20px;}
  .guide-content li{margin-bottom:6px;}
  .guide-content strong{color:var(--gold);}
  .guide-content table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13.5px;}
  .guide-content th,.guide-content td{border:1px solid var(--gold-soft);padding:7px 9px;text-align:left;}
  .guide-content th{color:var(--gold);font-family:var(--font-ui);font-size:11.5px;text-transform:uppercase;}

  /* Flashcards */
  .fc-counter{text-align:center;font-family:var(--font-ui);font-size:12.5px;color:var(--ivory-dim);margin-bottom:10px;}
  .fc-stage{perspective:1400px;margin-bottom:16px;}
  .fc-card{
    min-height:220px;border-radius:var(--radius);border:1px solid var(--gold-soft);
    background:var(--card);padding:22px;display:flex;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;position:relative;
  }
  .fc-card .fc-tag{
    position:absolute;top:12px;left:14px;font-family:var(--font-ui);font-size:10px;text-transform:uppercase;
    letter-spacing:0.06em;color:var(--gold);opacity:0.8;
  }
  .fc-card .fc-text{font-size:17px;line-height:1.6;color:var(--ivory);}
  .fc-card.answer{background:var(--gold-dim);}
  .fc-card .fc-hint{position:absolute;bottom:10px;right:14px;font-family:var(--font-ui);font-size:10px;color:var(--ivory-dim);}
  .fc-status-pill{
    display:inline-block;margin-top:10px;font-family:var(--font-ui);font-size:11px;padding:3px 9px;border-radius:20px;
  }
  .fc-status-pill.known{background:rgba(127,160,107,0.18);color:var(--success);}
  .fc-status-pill.review{background:rgba(192,86,63,0.18);color:var(--danger);}

  .fc-nav{display:flex;gap:8px;margin-bottom:10px;}
  .fc-nav button{
    flex:1;background:var(--card);border:1px solid var(--gold-soft);color:var(--ivory);
    border-radius:var(--radius-sm);padding:11px;font-size:13px;font-weight:600;cursor:pointer;min-height:44px;
  }
  .fc-actions{display:flex;gap:8px;}
  .fc-actions button{
    flex:1;border-radius:var(--radius-sm);padding:13px;font-size:13.5px;font-weight:700;cursor:pointer;border:1px solid;min-height:46px;
  }
  .fc-actions .btn-review{background:rgba(192,86,63,0.12);border-color:rgba(192,86,63,0.5);color:#E39A87;}
  .fc-actions .btn-known{background:rgba(127,160,107,0.14);border-color:rgba(127,160,107,0.55);color:#A9CB98;}

  /* Quiz */
  .quiz-q{background:var(--card);border:1px solid var(--gold-soft);border-radius:var(--radius);padding:15px;margin-bottom:14px;}
  .quiz-q .q-num{font-family:var(--font-ui);font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
  .quiz-q .q-text{font-size:15px;line-height:1.6;margin-bottom:12px;color:var(--ivory);}
  .quiz-opt{
    display:block;width:100%;text-align:left;background:var(--card-2);border:1px solid var(--gold-soft);
    color:var(--ivory);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:14px;cursor:pointer;
    font-family:var(--font-body);line-height:1.5;
  }
  .quiz-opt:active{background:#3A342C;}
  .quiz-opt.selected{border-color:var(--gold);background:var(--gold-dim);}
  .quiz-opt.correct{border-color:var(--success);background:rgba(127,160,107,0.18);}
  .quiz-opt.incorrect{border-color:var(--danger);background:rgba(192,86,63,0.18);}
  .quiz-opt[disabled]{cursor:default;}
  .rationale{
    margin-top:8px;font-size:13.5px;line-height:1.6;color:var(--ivory-dim);
    background:rgba(200,161,75,0.07);border-left:3px solid var(--gold);padding:9px 12px;border-radius:0 8px 8px 0;
  }
  .quiz-submit{
    width:100%;background:var(--gold);color:#221C10;border:none;border-radius:var(--radius-sm);
    padding:14px;font-weight:700;font-size:14.5px;cursor:pointer;margin:6px 0 16px;min-height:48px;
  }
  .quiz-submit:disabled{opacity:0.45;cursor:not-allowed;}
  .quiz-score{
    text-align:center;padding:20px 16px;background:var(--card);border:1px solid var(--gold-soft);border-radius:var(--radius);margin-bottom:14px;
  }
  .quiz-score .score-num{font-family:var(--font-head);font-size:34px;color:var(--gold);}
  .quiz-score .score-label{font-family:var(--font-ui);font-size:12px;color:var(--ivory-dim);margin-top:4px;}

<script>
(function(){
  "use strict";

  var LS_PREFIX = "threeMastery_";
  var LS = {
    LANG: LS_PREFIX+"lang",
    QUIZ: LS_PREFIX+"quizProgress",
    FLASH: LS_PREFIX+"flashProgress",
    MOCK: LS_PREFIX+"mockHistory"
  };

  /* ---------- storage helpers (quota-guarded) ---------- */
  function lsGet(key, fallback){
    try{
      var raw = localStorage.getItem(key);
      if(raw===null || raw===undefined) return fallback;
      return JSON.parse(raw);
    }catch(e){ return fallback; }
  }
  function lsSet(key, value){
    try{
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    }catch(e){
      console.warn("Storage write failed", e);
      return false;
    }
  }

  /* ---------- state ---------- */
  var state = {
    lang: lsGet(LS.LANG, "zh"),
    route: {screen:"home"}, // {screen:'home'} | {screen:'module', id, tab:'study'|'flash'|'quiz'} | {screen:'mock'}
    settingsOpen: false,
    modules: (window.THREE_MODULES || []).slice(),
    mock: null // {questions, answers, startedAt, elapsedTimer, finished}
  };

  var quizProgress = lsGet(LS.QUIZ, {});   // { [moduleId]: {best:0-100, passed:bool, lastAnswers:[...]} }
  var flashProgress = lsGet(LS.FLASH, {}); // { [moduleId]: { [cardIdx]: 'known'|'review' } }
  var mockHistory = lsGet(LS.MOCK, []);    // [{date, score, total, seconds}]

  function saveQuiz(){ lsSet(LS.QUIZ, quizProgress); }
  function saveFlash(){ lsSet(LS.FLASH, flashProgress); }
  function saveMock(){ lsSet(LS.MOCK, mockHistory); }

  /* ---------- i18n ---------- */
  var STR = {
    zh: {
      title:"THREE Product Mastery",
      subtitle:"光之勇士学院",
      subtitleEn:"Light Warriors Academy",

      foundation:"基础",

      importProgress:"导入进度",

      importSuccess:"导入成功",
      importFail:"文件格式错误，导入失败",

      resetSuccess:"进度已重置",
      score:"得分",
      yourAnswer:"你的答案",
      correctAnswer:"正确答案",
      rationale:"解析",
      noModules:"暂无模块数据，请先注入模块内容。",
      needMoreQuestions:"题库不足，请先添加模块题目。",
      date:"日期"
    },
    en: {
      title:"THREE Product Mastery",
      subtitle:"Light Warriors Academy",
      subtitleEn:"光之勇士学院",
      overallProgress:"Overall Progress",
      modulesPassed:"Modules Passed",
      mockExam:"Mock Exam",
      startMock:"Start Mock Exam (20 Qs)",
      foundation:"Foundation",
      products:"Products",
      closing:"Closing",
      notStarted:"Not started",
      studied:"Studied",
      passed:"Quiz passed ✓",
      study:"Study",
      flashcards:"Flashcards",
      quiz:"Quiz",
      gotIt:"Got it",
      review:"Review",
      prev:"Prev",
      next:"Next",
      tapToFlip:"Tap to flip",
      submit:"Submit",
      yourScore:"Your Score",
      pass:"Passed",
      fail:"Not Passed",
      retry:"Retry Quiz",
      settings:"Settings",
      exportProgress:"Export Progress",
      importProgress:"Import Progress",
      resetProgress:"Reset All Progress",
      close:"Close",
      mockHistory:"Mock Exam History",
      noHistory:"No attempts yet",
      newMock:"New Mock",
      finishMock:"Submit Exam",
      elapsed:"Elapsed",
      question:"Q",
      of:"of",
      backToHome:"Back",
      confirmImport:"Importing will overwrite current progress. Continue?",
      confirmReset:"This will erase all study progress. Continue?",
      importSuccess:"Import successful",
      importFail:"Invalid file — import failed",
      exportSuccess:"Progress exported",
      resetSuccess:"Progress reset",
      score:"Score",
      yourAnswer:"Your answer",
      correctAnswer:"Correct answer",
      rationale:"Rationale",
      noModules:"No module data yet. Inject module content to begin.",
      needMoreQuestions:"Not enough quiz questions available yet.",
      date:"Date"
    }
  };
  function t(key){ return (STR[state.lang] && STR[state.lang][key]) || key; }
  function L(obj){
    if(!obj) return "";
    return obj[state.lang] || obj.en || obj.zh || "";
  }

  /* ---------- utils ---------- */
  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function el(tag, attrs, children){
    var e = document.createElement(tag);
    attrs = attrs || {};
    for(var k in attrs){
      if(k==="class") e.className = attrs[k];
      else if(k==="html") e.innerHTML = attrs[k];
      else if(k.indexOf("on")===0 && typeof attrs[k]==="function") e.addEventListener(k.slice(2), attrs[k]);
      else if(attrs[k]!==null && attrs[k]!==undefined) e.setAttribute(k, attrs[k]);
    }
    (children||[]).forEach(function(c){
      if(c==null) return;
      if(typeof c === "string") e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }
  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
    }
    return a;
  }
  function fmtTime(sec){
    var m = Math.floor(sec/60), s = sec%60;
    return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  }
  function pad2(n){ return (n<10?"0":"")+n; }
  function todayStr(){
    var d = new Date();
    return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  }

  var toastTimer = null;
  function showToast(msg){
    var existing = document.querySelector(".toast");
    if(existing) existing.remove();
    var toast = el("div", {class:"toast"}, [msg]);
    document.body.appendChild(toast);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.remove(); }, 2600);
  }

  /* ---------- module helpers ---------- */
  function getModule(id){
    for(var i=0;i<state.modules.length;i++){
      if(state.modules[i].id === id) return state.modules[i];
    }
    return null;
  }
  function moduleStatus(mod){
    var qp = quizProgress[mod.id];
    if(qp && qp.passed) return "passed";
    var fp = flashProgress[mod.id];
    var hasFlashActivity = fp && Object.keys(fp).length>0;
    var hasQuizAttempt = qp && typeof qp.best === "number";
    if(hasFlashActivity || hasQuizAttempt) return "studied";
    return "notStarted";
  }
  function overallProgressPct(){
    if(!state.modules.length) return 0;
    var passedCount = 0;
    state.modules.forEach(function(m){
      if(quizProgress[m.id] && quizProgress[m.id].passed) passedCount++;
    });
    return Math.round((passedCount/state.modules.length)*100);
  }
  function sectionLabel(sec){
    if(sec==="foundation") return t("foundation");
    if(sec==="product") return t("products");
    if(sec==="closing") return t("closing");
    return sec;
  }
  var SECTION_ORDER = ["foundation","product","closing"];

  /* ---------- render root ---------- */
  function render(){
    var app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(renderTopbar());

    var r = state.route;
    if(r.screen === "home"){
      app.appendChild(renderHome());
    } else if(r.screen === "module"){
      var mod = getModule(r.id);
      if(!mod){
        state.route = {screen:"home"};
        app.appendChild(renderHome());
      } else {
        app.appendChild(renderModule(mod, r.tab||"study"));
      }
    } else if(r.screen === "mock"){
      app.appendChild(renderMock());
    }

    app.appendChild(renderFooter());
    document.documentElement.lang = state.lang==="zh" ? "zh-CN" : "en";

    if(state.settingsOpen){
      document.body.appendChild(renderSettingsModal());
    }
  }

  /* ---------- topbar ---------- */
  function renderTopbar(){
    var top = el("div", {class:"topbar"});
    var brand = el("div", {class:"brandmark", role:"button", onclick:function(){
      state.route = {screen:"home"};
      render();
    }}, [
      el("div", {class:"glyph"}, ["III"]),
      el("div", {class:"brandname"}, [
        "THREE Mastery",
        el("small",{},[t("subtitle")])
      ])
    ]);
    brand.style.cursor = "pointer";

    var actions = el("div", {class:"topbar-actions"}, [
      renderLangToggle(),
      el("button", {class:"iconbtn", "aria-label":t("settings"), onclick:function(){
        state.settingsOpen = true; render();
      }}, ["⚙️"])
    ]);

    top.appendChild(brand);
    top.appendChild(actions);
    return top;
  }
  function renderLangToggle(){
    var wrap = el("div", {class:"langtoggle"});
    var zh = el("button", {class: state.lang==="zh" ? "active":"" , onclick:function(){
      state.lang = "zh"; lsSet(LS.LANG, "zh"); render();
    }}, ["中文"]);
    var en = el("button", {class: state.lang==="en" ? "active":"", onclick:function(){
      state.lang = "en"; lsSet(LS.LANG, "en"); render();
    }}, ["EN"]);
    wrap.appendChild(zh);
    wrap.appendChild(en);
    return wrap;
  }

  /* ---------- home ---------- */
  function renderHome(){
    var frag = document.createDocumentFragment ? el("div",{}) : el("div",{});
    var wrap = el("div", {});

    var pct = overallProgressPct();
    var passedCount = state.modules.filter(function(m){ return quizProgress[m.id] && quizProgress[m.id].passed; }).length;

    var R = 48, C = 2*Math.PI*R;
    var offset = C - (pct/100)*C;

    var hero = el("div", {class:"hero"}, [
      el("h1", {}, [t("title")]),
      el("div", {class:"subtitle"}, [t("subtitle") + " / " + t("subtitleEn")]),
      el("div", {class:"progress-wrap"}, [
        el("div", {class:"ring"}, [
          (function(){
            var svgNS = "http://www.w3.org/2000/svg";
            var svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("viewBox","0 0 112 112");
            var track = document.createElementNS(svgNS,"circle");
            track.setAttribute("class","track");
            track.setAttribute("cx","56"); track.setAttribute("cy","56"); track.setAttribute("r",R);
            var fill = document.createElementNS(svgNS,"circle");
            fill.setAttribute("class","fill");
            fill.setAttribute("cx","56"); fill.setAttribute("cy","56"); fill.setAttribute("r",R);
            fill.setAttribute("stroke-dasharray", C.toFixed(1));
            fill.setAttribute("stroke-dashoffset", offset.toFixed(1));
            svg.appendChild(track); svg.appendChild(fill);
            return svg;
          })(),
          el("div", {class:"label"}, [
            el("div", {class:"pct"}, [pct+"%"]),
            el("div", {class:"cap"}, [t("overallProgress")])
          ])
        ]),
        el("div", {class:"ui", style:"font-size:12px;color:var(--ivory-dim)"}, [
          passedCount + " / " + state.modules.length + " " + t("modulesPassed")
        ])
      ]),
      el("button", {class:"mock-btn", onclick:function(){
        startMock();
      }}, ["🏆 " + t("startMock")])
    ]);
    wrap.appendChild(hero);

    if(!state.modules.length){
      wrap.appendChild(el("div", {class:"empty-state"}, [t("noModules")]));
      return wrap;
    }

    SECTION_ORDER.forEach(function(sec){
      var mods = state.modules.filter(function(m){ return m.section === sec; });
      if(!mods.length) return;
      wrap.appendChild(el("div", {class:"section-head"}, [sectionLabel(sec)]));
      mods.forEach(function(mod, idx){
        wrap.appendChild(renderModuleRow(mod, idx+1));
      });
    });

    return wrap;
  }

  function renderModuleRow(mod, displayNum){
    var status = moduleStatus(mod);
    var statusLabel = status==="passed" ? t("passed") : (status==="studied" ? t("studied") : t("notStarted"));
    var statusClass = status==="passed" ? "passed" : (status==="studied" ? "studied" : "");
    var row = el("button", {class:"module-row", onclick:function(){
      state.route = {screen:"module", id:mod.id, tab:"study"};
      render();
      window.scrollTo(0,0);
    }}, [
      el("div", {class:"num"}, [String(displayNum)]),
      el("div", {class:"info"}, [
        el("div", {class:"title"}, [L(mod.title)]),
        el("div", {class:"status "+statusClass}, [statusLabel])
      ]),
      el("div", {class:"chev"}, ["›"])
    ]);
    return row;
  }

  /* ---------- module screen ---------- */
  function renderModule(mod, activeTab){
    var wrap = el("div", {});

    wrap.appendChild(el("div", {class:"screen-head"}, [
      el("button", {class:"backbtn", "aria-label":t("backToHome"), onclick:function(){
        state.route = {screen:"home"}; render(); window.scrollTo(0,0);
      }}, ["‹"]),
      el("div", {class:"screen-title"}, [
        el("h2", {}, [L(mod.title)])
      ])
    ]));

    wrap.appendChild(el("div", {class:"hook-card"}, [L(mod.hook)]));

    var tabs = el("div", {class:"tabs"}, [
      el("button", {class: activeTab==="study"?"active":"", onclick:function(){
        state.route = {screen:"module", id:mod.id, tab:"study"}; render();
      }}, [t("study")]),
      el("button", {class: activeTab==="flash"?"active":"", onclick:function(){
        state.route = {screen:"module", id:mod.id, tab:"flash"}; render();
      }}, [t("flashcards")]),
      el("button", {class: activeTab==="quiz"?"active":"", onclick:function(){
        state.route = {screen:"module", id:mod.id, tab:"quiz"}; render();
      }}, [t("quiz")])
    ]);
    wrap.appendChild(tabs);

    if(activeTab === "study"){
      wrap.appendChild(renderStudyTab(mod));
    } else if(activeTab === "flash"){
      wrap.appendChild(renderFlashTab(mod));
    } else {
      wrap.appendChild(renderQuizTab(mod));
    }

    return wrap;
  }

  function renderStudyTab(mod){
    var wrap = el("div", {});
    if(mod.visageIntro){
      wrap.appendChild(el("div", {class:"callout"}, [
        el("div", {class:"callout-label"}, ["✨ " + (state.lang==="zh"?"特别介绍":"Special Intro")]),
        el("div", {class:"callout-body"}, [L(mod.visageIntro)])
      ]));
    }
    wrap.appendChild(el("div", {class:"card"}, [
      el("div", {class:"guide-content", html: L(mod.guideHtml) || ""})
    ]));
    return wrap;
  }

  /* ---------- flashcards ---------- */
  var flashState = {}; // per moduleId: {idx, flipped}
  function getFlashState(modId, total){
    if(!flashState[modId]) flashState[modId] = {idx:0, flipped:false};
    if(flashState[modId].idx >= total) flashState[modId].idx = 0;
    return flashState[modId];
  }

  function renderFlashTab(mod){
    var cards = mod.flashcards || [];
    var wrap = el("div", {});
    if(!cards.length){
      wrap.appendChild(el("div", {class:"empty-state"}, [t("noModules")]));
      return wrap;
    }
    var fs = getFlashState(mod.id, cards.length);
    var card = cards[fs.idx];
    var savedStatus = (flashProgress[mod.id] || {})[fs.idx];

    wrap.appendChild(el("div", {class:"fc-counter"}, [(fs.idx+1) + " / " + cards.length]));

    var stage = el("div", {class:"fc-stage"});
    var faceObj = fs.flipped ? card.a : card.q;
    var cardEl = el("div", {class:"fc-card" + (fs.flipped?" answer":""), onclick:function(){
      fs.flipped = !fs.flipped;
      render();
    }}, [
      el("div", {class:"fc-tag"}, [fs.flipped ? (state.lang==="zh"?"答案":"Answer") : (state.lang==="zh"?"问题":"Question")]),
      el("div", {class:"fc-text"}, [L(faceObj)]),
      el("div", {class:"fc-hint"}, [t("tapToFlip")])
    ]);
    stage.appendChild(cardEl);
    wrap.appendChild(stage);

    if(savedStatus){
      wrap.appendChild(el("div", {style:"text-align:center;margin-bottom:12px;"}, [
        el("span", {class:"fc-status-pill " + savedStatus}, [
          savedStatus==="known" ? ("✓ " + t("gotIt")) : ("↻ " + t("review"))
        ])
      ]));
    }

    wrap.appendChild(el("div", {class:"fc-nav"}, [
      el("button", {onclick:function(){
        fs.idx = (fs.idx - 1 + cards.length) % cards.length;
        fs.flipped = false;
        render();
      }}, ["‹ " + t("prev")]),
      el("button", {onclick:function(){
        fs.idx = (fs.idx + 1) % cards.length;
        fs.flipped = false;
        render();
      }}, [t("next") + " ›"])
    ]));

    wrap.appendChild(el("div", {class:"fc-actions"}, [
      el("button", {class:"btn-review", onclick:function(){
        setFlashStatus(mod.id, fs.idx, "review");
      }}, ["↻ " + t("review")]),
      el("button", {class:"btn-known", onclick:function(){
        setFlashStatus(mod.id, fs.idx, "known");
      }}, ["✓ " + t("gotIt")])
    ]));

    return wrap;
  }

  function setFlashStatus(modId, idx, status){
    if(!flashProgress[modId]) flashProgress[modId] = {};
    flashProgress[modId][idx] = status;
    saveFlash();
    var cards = (getModule(modId).flashcards||[]);
    var fs = getFlashState(modId, cards.length);
    if(cards.length>1){
      fs.idx = (fs.idx + 1) % cards.length;
      fs.flipped = false;
    }
    render();
  }

  /* ---------- quiz (module) ---------- */
  var quizSession = {}; // per moduleId: {answers:[idx or null], submitted:bool}
  function getQuizSession(modId, total){
    if(!quizSession[modId] || quizSession[modId].total !== total){
      quizSession[modId] = {answers: new Array(total).fill(null), submitted:false, total:total};
    }
    return quizSession[modId];
  }

  function renderQuizTab(mod){
    var questions = mod.quiz || [];
    var wrap = el("div", {});
    if(!questions.length){
      wrap.appendChild(el("div", {class:"empty-state"}, [t("noModules")]));
      return wrap;
    }
    var sess = getQuizSession(mod.id, questions.length);

    if(sess.submitted){
      var correctCount = 0;
      questions.forEach(function(q, i){ if(sess.answers[i] === q.answer) correctCount++; });
      var pct = Math.round((correctCount/questions.length)*100);
      var passedNow = pct >= 80;

      wrap.appendChild(el("div", {class:"quiz-score"}, [
        el("div", {class:"score-num"}, [correctCount + "/" + questions.length]),
        el("div", {class:"score-label"}, [t("yourScore") + " · " + pct + "%"]),
        el("div", {class:"pass-flag " + (passedNow?"pass":"fail")}, [passedNow ? t("pass") : t("fail")])
      ]));

      questions.forEach(function(q, i){
        wrap.appendChild(renderQuizQuestion(q, i, sess, true));
      });

      wrap.appendChild(el("button", {class:"retry-btn", onclick:function(){
        quizSession[mod.id] = {answers:new Array(questions.length).fill(null), submitted:false, total:questions.length};
        render();
      }}, [t("retry")]));

      return wrap;
    }

    questions.forEach(function(q, i){
      wrap.appendChild(renderQuizQuestion(q, i, sess, false));
    });

    var allAnswered = sess.answers.every(function(a){ return a !== null; });
    wrap.appendChild(el("button", {class:"quiz-submit", disabled: !allAnswered, onclick:function(){
      if(!allAnswered) return;
      sess.submitted = true;
      var correctCount = 0;
      questions.forEach(function(q, i){ if(sess.answers[i] === q.answer) correctCount++; });
      var pct = Math.round((correctCount/questions.length)*100);
      var passedNow = pct >= 80;
      var prev = quizProgress[mod.id] || {best:0, passed:false};
      quizProgress[mod.id] = {
        best: Math.max(prev.best||0, pct),
        passed: prev.passed || passedNow,
        lastScore: pct
      };
      saveQuiz();
      render();
      window.scrollTo(0,0);
    }}, [t("submit")]));

    return wrap;
  }

  function renderQuizQuestion(q, i, sess, showResult){
    var qWrap = el("div", {class:"quiz-q"});
    qWrap.appendChild(el("div", {class:"q-num"}, [t("question") + " " + (i+1)]));
    qWrap.appendChild(el("div", {class:"q-text"}, [L(q.q)]));

    var opts = (q.options && q.options[state.lang]) || (q.options && q.options.en) || [];
    opts.forEach(function(optText, optIdx){
      var cls = "quiz-opt";
      var selected = sess.answers[i] === optIdx;
      if(showResult){
        if(optIdx === q.answer) cls += " correct";
        else if(selected && optIdx !== q.answer) cls += " incorrect";
      } else if(selected){
        cls += " selected";
      }
      var btn = el("button", {class:cls, disabled: showResult ? "disabled" : null, onclick:function(){
        if(showResult) return;
        sess.answers[i] = optIdx;
        render();
      }}, [optText]);
      qWrap.appendChild(btn);
    });

    if(showResult){
      qWrap.appendChild(el("div", {class:"rationale"}, [L(q.rationale)]));
    }
    return qWrap;
  }

  /* ---------- mock exam ---------- */
  function collectAllQuestions(){
    var all = [];
    state.modules.forEach(function(m){
      (m.quiz||[]).forEach(function(q){
        all.push({q:q, moduleId:m.id, moduleTitle:m.title});
      });
    });
    return all;
  }

  function startMock(){
    var all = collectAllQuestions();
    if(!all.length){
      showToast(t("needMoreQuestions"));
      return;
    }
    var count = Math.min(20, all.length);
    var picked = shuffle(all).slice(0, count);
    state.mock = {
      questions: picked,
      answers: new Array(picked.length).fill(null),
      submitted: false,
      startedAt: Date.now(),
      elapsedSec: 0
    };
    state.route = {screen:"mock"};
    render();
    window.scrollTo(0,0);
    startMockTimer();
  }

  var mockTimerHandle = null;
  function startMockTimer(){
    stopMockTimer();
    mockTimerHandle = setInterval(function(){
      if(!state.mock || state.mock.submitted){ stopMockTimer(); return; }
      state.mock.elapsedSec = Math.floor((Date.now() - state.mock.startedAt)/1000);
      var timeEl = document.getElementById("mockTimerVal");
      if(timeEl) timeEl.textContent = fmtTime(state.mock.elapsedSec);
    }, 1000);
  }
  function stopMockTimer(){
    if(mockTimerHandle){ clearInterval(mockTimerHandle); mockTimerHandle = null; }
  }

  function renderMock(){
    var wrap = el("div", {});
    if(!state.mock){
      wrap.appendChild(el("div", {class:"empty-state"}, [t("needMoreQuestions")]));
      return wrap;
    }
    var mock = state.mock;

    wrap.appendChild(el("div", {class:"screen-head"}, [
      el("button", {class:"backbtn", "aria-label":t("backToHome"), onclick:function(){
        stopMockTimer();
        state.route = {screen:"home"}; render(); window.scrollTo(0,0);
      }}, ["‹"]),
      el("div", {class:"screen-title"}, [
        el("h2", {}, ["🏆 " + t("mockExam")])
      ])
    ]));

    wrap.appendChild(el("div", {class:"timer-bar"}, [
      el("div", {}, [
        el("div", {class:"t-label"}, [t("elapsed")]),
        el("div", {class:"t-val", id:"mockTimerVal"}, [fmtTime(mock.elapsedSec)])
      ]),
      el("div", {class:"mock-progress"}, [
        mock.answers.filter(function(a){return a!==null;}).length + " " + t("of") + " " + mock.questions.length
      ])
    ]));

    if(mock.submitted){
      var correctCount = 0;
      mock.questions.forEach(function(item, i){ if(mock.answers[i] === item.q.answer) correctCount++; });
      var pct = Math.round((correctCount/mock.questions.length)*100);

      wrap.appendChild(el("div", {class:"quiz-score"}, [
        el("div", {class:"score-num"}, [correctCount + "/" + mock.questions.length]),
        el("div", {class:"score-label"}, [t("yourScore") + " · " + pct + "% · " + t("elapsed") + " " + fmtTime(mock.elapsedSec)])
      ]));

      mock.questions.forEach(function(item, i){
        var qCopy = item.q;
        var pseudoSess = {answers: mock.answers};
        wrap.appendChild(renderQuizQuestion(qCopy, i, pseudoSess, true));
      });

      wrap.appendChild(el("button", {class:"retry-btn", onclick:function(){
        startMock();
      }}, [t("newMock")]));
    } else {
      mock.questions.forEach(function(item, i){
        wrap.appendChild(renderQuizQuestion(item.q, i, mock, false));
      });

      var allAnswered = mock.answers.every(function(a){ return a!==null; });
      wrap.appendChild(el("button", {class:"quiz-submit", disabled: !allAnswered, onclick:function(){
        if(!allAnswered) return;
        mock.submitted = true;
        mock.elapsedSec = Math.floor((Date.now()-mock.startedAt)/1000);
        stopMockTimer();
        var correctCount = 0;
        mock.questions.forEach(function(item, i){ if(mock.answers[i] === item.q.answer) correctCount++; });
        mockHistory.unshift({
          date: todayStr(),
          score: correctCount,
          total: mock.questions.length,
          seconds: mock.elapsedSec
        });
        mockHistory = mockHistory.slice(0, 10);
        saveMock();
        render();
        window.scrollTo(0,0);
      }}, [t("finishMock")]));
    }

    return wrap;
  }

  /* ---------- settings modal ---------- */
  function renderSettingsModal(){
    var backdrop = el("div", {class:"modal-backdrop", onclick:function(e){
      if(e.target === backdrop){ state.settingsOpen = false; closeModal(); }
    }});
    var sheet = el("div", {class:"modal-sheet"});
    sheet.appendChild(el("button", {class:"modal-close", onclick:function(){
      state.settingsOpen = false; closeModal();
    }}, ["×"]));
    sheet.appendChild(el("h3", {}, ["⚙️ " + t("settings")]));

    sheet.appendChild(el("div", {class:"modal-row"}, [
      el("button", {class:"modal-btn primary", onclick:exportProgress}, ["⬇ " + t("exportProgress")])
    ]));

    var fileInput = el("input", {type:"file", accept:"application/json", onchange:function(e){
      handleImportFile(e.target.files && e.target.files[0]);
    }});
    sheet.appendChild(el("div", {class:"modal-row"}, [
      el("button", {class:"modal-btn", onclick:function(){ fileInput.click(); }}, ["⬆ " + t("importProgress")]),
      fileInput
    ]));

    sheet.appendChild(el("div", {class:"modal-row"}, [
      el("button", {class:"modal-btn danger", onclick:function(){
        if(confirm(t("confirmReset"))){
          resetProgress();
        }
      }}, ["⚠ " + t("resetProgress")])
    ]));

    sheet.appendChild(el("h3", {style:"margin-top:20px;font-size:14px;"}, [t("mockHistory")]));
    if(!mockHistory.length){
      sheet.appendChild(el("div", {class:"mock-history"}, [t("noHistory")]));
    } else {
      var hist = el("div", {class:"mock-history"});
      mockHistory.forEach(function(h){
        hist.appendChild(el("div", {class:"hrow"}, [
          el("span", {}, [h.date]),
          el("span", {}, [h.score + "/" + h.total + " · " + fmtTime(h.seconds)])
        ]));
      });
      sheet.appendChild(hist);
    }

    backdrop.appendChild(sheet);
    return backdrop;
  }
  function closeModal(){
    var backdrop = document.querySelector(".modal-backdrop");
    if(backdrop) backdrop.remove();
  }

  function exportProgress(){
    var payload = {
      app:"threeMastery",
      version:1,
      exportedAt: new Date().toISOString(),
      lang: state.lang,
      quizProgress: quizProgress,
      flashProgress: flashProgress,
      mockHistory: mockHistory
    };
    try{
      var blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "threeMastery_progress_" + todayStr() + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      showToast(t("exportSuccess"));
    }catch(e){
      console.warn("Export failed", e);
      showToast(t("importFail"));
    }
  }

  function handleImportFile(file){
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        if(!data || typeof data !== "object") throw new Error("bad json");
        if(!confirm(t("confirmImport"))) return;
        if(data.quizProgress && typeof data.quizProgress === "object") quizProgress = data.quizProgress;
        if(data.flashProgress && typeof data.flashProgress === "object") flashProgress = data.flashProgress;
        if(Array.isArray(data.mockHistory)) mockHistory = data.mockHistory;
        if(data.lang === "en" || data.lang === "zh") { state.lang = data.lang; lsSet(LS.LANG, state.lang); }
        saveQuiz(); saveFlash(); saveMock();
        showToast(t("importSuccess"));
        state.settingsOpen = false;
        closeModal();
        render();
      }catch(err){
        console.warn("Import failed", err);
        showToast(t("importFail"));
      }
    };
    reader.onerror = function(){ showToast(t("importFail")); };
    reader.readAsText(file);
  }

  function resetProgress(){
    quizProgress = {};
    flashProgress = {};
    mockHistory = [];
    saveQuiz(); saveFlash(); saveMock();
    flashState = {};
    quizSession = {};
    showToast(t("resetSuccess"));
    state.settingsOpen = false;
    closeModal();
    render();
  }

  /* ---------- footer ---------- */
  function renderFooter(){
    return el("div", {class:"footer"}, [
      el("div", {class:"tagline"}, ["Soul + System = Success"]),
      el("div", {class:"creed"}, ["Build Businesses · Build People · Build Leaders · Build Legacy · v1.0.0"])
    ]);
  }

  /* ---------- init ---------- */
  document.addEventListener("DOMContentLoaded", function(){
    render();
  });
  if(document.readyState !== "loading"){
    render();
  }
})();
</script>
<script>
window.TPM_VERSION='1.0.0';
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
</script>
